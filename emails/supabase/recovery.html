<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset your AirBI password</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f6f7;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;">
          <tr>
            <td style="padding:28px 32px 12px;">
              <table role="presentation" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="background:#000000;border-radius:12px;padding:8px 10px;">
                    <img src="{{ .SiteURL }}/brand/airbi-logo.png" alt="AirBI" width="40" height="32" style="display:block;" />
                  </td>
                  <td style="padding-left:12px;">
                    <p style="margin:0;font-size:16px;font-weight:700;color:#0f172a;">AirBI</p>
                    <p style="margin:2px 0 0;font-size:11px;color:#64748b;">Enterprise intelligence</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 0;">
              <h1 style="margin:0;font-size:22px;font-weight:700;color:#0f172a;">Reset your password</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 8px;font-size:15px;line-height:1.6;color:#0f172a;">
              <p style="margin:0 0 12px;">We received a request to reset the password for <strong>{{ .Email }}</strong>.</p>
              <p style="margin:0;">Choose a new password using the button below. This link expires soon for your security.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 28px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#0d9488;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:12px 24px;border-radius:10px;">Reset password</a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px;border-top:1px solid #e2e8f0;">
              <p style="margin:16px 0 0;font-size:12px;color:#64748b;line-height:1.5;">If you did not request a reset, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
